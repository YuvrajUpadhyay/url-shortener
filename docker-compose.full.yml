version: '3.9'

# Full production-like stack.
# Usage: docker compose -f docker-compose.yml -f docker-compose.full.yml up --build

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: urlshortener_server
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      BASE_URL: http://localhost:5000
      CLIENT_URL: http://localhost:4173
      MONGO_URI: mongodb://mongo:27017/url_shortener
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: ./server
      dockerfile: Dockerfile.worker
    container_name: urlshortener_worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/url_shortener
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    # Scale workers horizontally: docker compose up --scale worker=3
    deploy:
      replicas: 1

  mongo:
    image: mongo:7-jammy
    container_name: urlshortener_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: urlshortener_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: urlshortener_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'check_port_connectivity']
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  mongo_data:
  redis_data:
  rabbitmq_data:
